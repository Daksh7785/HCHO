apiVersion: v1
kind: ConfigMap
metadata:
  name: atmos-watch-config
  namespace: default
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres_secure_pass@atmos-postgres-service:5432/hcho_db"
  REDIS_URL: "redis://:redis_secure_pass@atmos-redis-service:6379/0"
  CELERY_BROKER_URL: "amqp://guest:guest@atmos-rabbitmq-service:5672//"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmos-postgres
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atmos-postgres
  template:
    metadata:
      labels:
        app: atmos-postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres_secure_pass"
            - name: POSTGRES_DB
              value: "hcho_db"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: atmos-postgres-service
  namespace: default
spec:
  ports:
    - port: 5432
  selector:
    app: atmos-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmos-redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atmos-redis
  template:
    metadata:
      labels:
        app: atmos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["redis-server", "--requirepass", "redis_secure_pass"]
---
apiVersion: v1
kind: Service
metadata:
  name: atmos-redis-service
  namespace: default
spec:
  ports:
    - port: 6379
  selector:
    app: atmos-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmos-rabbitmq
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atmos-rabbitmq
  template:
    metadata:
      labels:
        app: atmos-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: atmos-rabbitmq-service
  namespace: default
spec:
  ports:
    - name: amqp
      port: 5672
    - name: management
      port: 15672
  selector:
    app: atmos-rabbitmq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmos-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atmos-backend
  template:
    metadata:
      labels:
        app: atmos-backend
    spec:
      containers:
        - name: backend
          image: daksh7785/hcho-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: atmos-watch-config
---
apiVersion: v1
kind: Service
metadata:
  name: atmos-backend-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: atmos-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmos-celery-worker
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atmos-celery-worker
  template:
    metadata:
      labels:
        app: atmos-celery-worker
    spec:
      containers:
        - name: worker
          image: daksh7785/hcho-backend:latest
          command: ["celery", "-A", "app.data_pipeline.tasks.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: atmos-watch-config
