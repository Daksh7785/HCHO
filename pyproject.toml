[tool.ruff]
# Target Python version
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# Select rules (E: pycodestyle, F: pyflakes, I: isort, B: bugbear)
select = ["E", "F", "I", "B"]
ignore = []

# Exclude common patterns
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
strict = false

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --tb=short"
testpaths = [
    "tests",
    "db"
]
asyncio_mode = "auto"
pythonpath = ["backend"]
